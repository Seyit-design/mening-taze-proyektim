<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sport Ýaryşlary Dolandyryş{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar-brand {
            font-weight: bold;
        }
        .stat-card {
            transition: transform 0.3s;
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        .footer {
            background-color: #f8f9fa;
            padding: 20px 0;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="{% url 'bas_sahypa' %}">🏆 Sport Ýaryşlary</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'oyuncu_list' %}">Oýunçylar</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'yarys_list' %}">Ýaryşlar</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'statistika' %}">Statistika</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-4">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="footer mt-auto py-4 shadow-lg" style="background: #f8f9fa; border-top: 3px solid #0d6efd;">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-6 text-md-start text-center">
                    <p class="text-muted small mb-0">
                        &copy; {% now "Y" %} Dolandyryş Sistemasy. Ähli hukuklar goralan.<br>
                        <span class="opacity-75">Sporty sanly ulgamda ösdürmek üçin taýýarlandy.</span>
                    </p>
                </div>
                <div class="col-md-6 text-md-end text-center mt-3 mt-md-0">
                    <div class="d-inline-block p-2 rounded-3 bg-white border shadow-sm">
                        <small class="text-uppercase text-muted" style="font-size: 0.7rem; display: block; letter-spacing: 1px;">Project by</small>
                        <span class="fw-bold text-primary">G. Orazmuhammedow</span>
                    </div>
                </div>
            </div>
        </div>
    </footer>
